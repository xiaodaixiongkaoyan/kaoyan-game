<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>🎮 人生Online · 医学生考研冲刺 v1.3</title>
    <style>
        * {
            box-sizing: border-box;
            font-family: 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
            margin: 0;
            padding: 0;
        }
        body {
            background: #0b1a2f;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            padding: 20px 10px;
            position: relative;
            overflow-x: hidden;
        }
        
        /* 加量版的医学元素背景贴纸 */
        .medical-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
            opacity: 0.35;
        }
        .medical-bg::before {
            content: "⚕️";
            position: absolute;
            top: 5%;
            right: 5%;
            font-size: 8rem;
            transform: rotate(15deg);
            color: #4a90e2;
            opacity: 0.3;
        }
        .medical-bg::after {
            content: "🫀";
            position: absolute;
            bottom: 5%;
            left: 5%;
            font-size: 10rem;
            transform: rotate(-10deg);
            color: #e24a4a;
            opacity: 0.25;
        }
        .medical-bg span:nth-child(1) {
            position: absolute;
            top: 20%;
            left: 10%;
            font-size: 6rem;
            opacity: 0.25;
            transform: rotate(5deg);
        }
        .medical-bg span:nth-child(2) {
            position: absolute;
            bottom: 30%;
            right: 15%;
            font-size: 7rem;
            opacity: 0.2;
            transform: rotate(-5deg);
        }
        .medical-bg span:nth-child(3) {
            position: absolute;
            top: 60%;
            left: 20%;
            font-size: 5rem;
            opacity: 0.3;
            transform: rotate(20deg);
        }
        .medical-bg span:nth-child(4) {
            position: absolute;
            bottom: 40%;
            right: 25%;
            font-size: 6rem;
            opacity: 0.2;
            transform: rotate(-15deg);
        }
        
        .game-container {
            max-width: 800px;
            width: 100%;
            display: flex;
            flex-direction: column;
            gap: 16px;
            position: relative;
            z-index: 1;
        }
        
        .panel {
            background: rgba(18, 30, 46, 0.9);
            backdrop-filter: blur(4px);
            border: 1px solid #2e4b62;
            border-radius: 24px;
            padding: 20px 18px;
            box-shadow: 0 15px 25px -10px rgba(0, 0, 0, 0.6), inset 0 0 0 1px rgba(120, 180, 255, 0.15);
            color: #d4e9ff;
        }
        h2, h3 {
            font-weight: 400;
            letter-spacing: 1px;
            color: #b3e0ff;
            border-left: 4px solid #3fa7ff;
            padding-left: 14px;
            margin-bottom: 18px;
            font-size: 1.5rem;
            text-shadow: 0 2px 3px #00000040;
        }
        h3 {
            font-size: 1.2rem;
            margin: 10px 0 12px 0;
            border-left-color: #6bc5ff;
        }
        .time-grid {
            display: flex;
            flex-wrap: wrap;
            gap: 15px 25px;
            background: #0e2233;
            border-radius: 40px;
            padding: 14px 20px;
            margin-bottom: 8px;
            border: 1px solid #2b5270;
        }
        .time-item {
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .time-label {
            color: #7aa9c4;
            font-size: 0.9rem;
        }
        .time-value {
            background: #00000030;
            padding: 4px 12px;
            border-radius: 30px;
            font-weight: 600;
            color: #e3f2ff;
            border: 1px solid #38658a;
        }
        .sign-area {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 15px;
            background: #0e2a3a;
            padding: 15px 20px;
            border-radius: 60px;
        }
        .sign-info {
            display: flex;
            flex-direction: column;
        }
        .sign-title {
            color: #b3e0ff;
            font-size: 1.1rem;
        }
        .sign-streak {
            color: #96bcdd;
            font-size: 0.9rem;
        }
        .sign-btn {
            background: #ffb347;
            color: #0b1a2f;
            font-weight: 700;
            padding: 12px 30px;
            border-radius: 40px;
            border: none;
            font-size: 1.2rem;
            cursor: pointer;
            transition: 0.2s;
            border: 1px solid #ffd700;
        }
        .sign-btn:hover {
            background: #ffa01e;
            transform: scale(0.98);
        }
        .week-indicator {
            display: flex;
            gap: 8px;
            margin-top: 15px;
            justify-content: center;
            flex-wrap: wrap;
        }
        .task-table {
            width: 100%;
            border-collapse: collapse;
            margin: 10px 0 5px;
        }
        .task-table th {
            text-align: left;
            color: #8bb9da;
            font-weight: 400;
            font-size: 0.85rem;
            padding-bottom: 8px;
            border-bottom: 1px dashed #2e5f7a;
        }
        .task-table td {
            padding: 12px 4px 12px 0;
            border-bottom: 1px solid #1e4057;
        }
        .task-num {
            background: #1b4560;
            width: 38px;
            height: 38px;
            border-radius: 40px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            color: white;
            border: 1px solid #60b0ff;
            margin-right: 10px;
        }
        .task-num-timed {
            background: #9b59b6;
            width: 38px;
            height: 38px;
            border-radius: 40px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            color: white;
            border: 1px solid #d0a0ff;
            margin-right: 10px;
        }
        .task-name {
            font-size: 1.05rem;
        }
        .task-limit {
            color: #96bcdd;
            font-size: 0.8rem;
        }
        .reward-badge {
            background: #1f5f3e;
            border: 1px solid #6bb88b;
            color: #d0ffd0;
            padding: 5px 12px;
            border-radius: 30px;
            font-weight: 600;
            font-size: 0.9rem;
            white-space: nowrap;
        }
        .button-small {
            background: #2b4b66;
            border: none;
            color: #d4f0ff;
            padding: 8px 16px;
            border-radius: 40px;
            font-size: 0.9rem;
            font-weight: 600;
            cursor: pointer;
            border: 1px solid #4786b0;
            transition: 0.2s;
            box-shadow: 0 3px 5px #00000030;
        }
        .button-small:hover {
            background: #366f94;
            border-color: #7ac4ff;
            transform: scale(0.98);
        }
        .track-row {
            background: #102f41;
            border-radius: 20px;
            padding: 14px 16px;
            margin: 10px 0;
            display: flex;
            flex-wrap: wrap;
            justify-content: space-between;
            align-items: center;
        }
        .store-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
            gap: 12px;
        }
        .store-item {
            background: #173e55;
            border-radius: 30px;
            padding: 14px 8px;
            text-align: center;
            border: 1px solid #5c93b5;
            cursor: pointer;
            transition: 0.2s;
        }
        .store-item:hover {
            background: #205c7a;
            border-color: #a2d0ff;
        }
        .timed-task-input {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }
        .input-row {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }
        .task-input {
            flex: 2;
            min-width: 200px;
            background: #1a384b;
            border: 1px solid #3f7b9e;
            border-radius: 60px;
            padding: 16px 22px;
            font-size: 1rem;
            color: white;
            outline: none;
        }
        .number-input {
            flex: 1;
            min-width: 80px;
            background: #1a384b;
            border: 1px solid #3f7b9e;
            border-radius: 60px;
            padding: 16px 22px;
            font-size: 1rem;
            color: white;
            outline: none;
        }
        .add-btn {
            background: #ffb347;
            color: #0b1a2f;
            font-weight: 700;
            padding: 12px 30px;
            border-radius: 40px;
            border: none;
            font-size: 1.1rem;
            cursor: pointer;
            transition: 0.2s;
            border: 1px solid #ffd700;
            align-self: flex-end;
        }
        .add-btn:hover {
            background: #ffa01e;
        }
        .cloud-status {
            background: #123d54;
            border-radius: 30px;
            padding: 10px 18px;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            font-size: 0.9rem;
            border: 1px solid #2e9aff;
        }
        .expired {
            opacity: 0.6;
        }
        .log-panel {
            background: #0e1b26;
            border-radius: 30px;
            padding: 16px 22px;
            font-size: 0.95rem;
            color: #b0d6f0;
            border: 1px solid #256685;
            min-height: 60px;
            max-height: 100px;
            overflow-y: auto;
        }
    </style>
</head>
<body>
    <!-- 加量版的医学元素背景 -->
    <div class="medical-bg">
        <span>🩺</span>
        <span>💉</span>
        <span>🧪</span>
        <span>📋</span>
        <span>💊</span>
        <span>🫁</span>
    </div>

    <div class="game-container" id="app">
        <!-- 云端状态栏 -->
        <div class="panel" style="padding: 12px 18px; background: #0f2b3b;">
            <div style="display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 10px;">
                <div class="cloud-status">
                    <span>☁️ 云端同步</span>
                    <span id="cloudStatus" style="color: #8affb8;">● 已连接</span>
                </div>
                <div>
                    <button class="button-small" id="manualSaveBtn" style="background: #1f5f5f;">💾 手动保存</button>
                    <button class="button-small" id="manualLoadBtn" style="background: #5f4f1f;">📂 手动加载</button>
                </div>
            </div>
        </div>

        <!-- 时间与倒计时 + 签到按钮 -->
        <div class="panel">
            <div class="time-grid">
                <div class="time-item"><span class="time-label">📅 日期</span><span class="time-value" id="currentDate"></span></div>
                <div class="time-item"><span class="time-label">⏳ 考研倒计时</span><span class="time-value" id="examCountdown"></span></div>
                <div class="time-item"><span class="time-label">📆 本周</span><span class="time-value" id="weekProgress"></span></div>
            </div>
            
            <!-- 签到区域 -->
            <div class="sign-area">
                <div class="sign-info">
                    <span class="sign-title">📌 每日签到</span>
                    <span class="sign-streak" id="signStreakDisplay">本周7:30前签到 0/5 次</span>
                </div>
                <button class="sign-btn" id="signBtn">签到</button>
            </div>
            
            <!-- 签到周指示器（美化版） -->
            <div class="week-indicator" id="signWeekIndicator"></div>
        </div>

        <!-- 今日任务面板 -->
        <div class="panel">
            <h2>💰 今日任务 · <span id="weekdayDisplay"></span></h2>
            <table class="task-table" id="taskTable"></table>
            <div style="margin-top: 16px; text-align: right;">
                <span>🪙 今日获得 <strong id="todayEarn">0</strong> 币</span>
            </div>
        </div>

        <!-- 限时任务添加栏（放在今日任务下面） -->
        <div class="panel" style="background: #1a3343;">
            <h3>⏳ 添加限时任务</h3>
            <div class="timed-task-input">
                <div class="input-row">
                    <input type="text" class="task-input" id="taskNameInput" placeholder="任务名称（如：洗衣服）">
                    <input type="number" class="number-input" id="taskRewardInput" placeholder="奖励币" min="1" value="1">
                    <input type="number" class="number-input" id="taskDaysInput" placeholder="限时几天" min="1" value="2">
                </div>
                <button class="add-btn" id="addTaskBtn">➕ 添加限时任务</button>
            </div>
        </div>

        <!-- 商店 + 小钱袋（合并） -->
        <div class="panel">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px;">
                <h3 style="margin: 0; border-left: none; padding-left: 0;">🛒 商店兑换</h3>
                <!-- 小钱袋放在商店里面 -->
                <div style="
                    background: linear-gradient(145deg, #b8860b, #8b6911);
                    border-radius: 40px;
                    padding: 8px 20px;
                    display: flex;
                    align-items: center;
                    gap: 10px;
                    border: 2px solid #ffd700;
                    box-shadow: 0 5px 10px rgba(0,0,0,0.5);
                ">
                    <span style="font-size: 1.8rem;">💰</span>
                    <span style="font-size: 2rem; font-weight: 800; color: #ffecb3;" id="totalCoins">0</span>
                    <span style="color: #ffd8a0;">币</span>
                </div>
            </div>
            <div class="store-grid" id="storeGrid"></div>
        </div>

        <!-- 连续打卡追踪 -->
        <div class="panel">
            <h3>⏰ 连续打卡追踪</h3>
            <div class="track-row">
                <span>早起签到连续: <strong id="earlyStreak">0</strong> 天</span>
                <span class="badge">连5天 +2币</span>
            </div>
            <div class="track-row">
                <span>英语单词连续: <strong id="wordStreak">0</strong> 天</span>
                <span class="badge">连7天 +3币 / 中断 -2币</span>
            </div>
            <div class="track-row">
                <span>本周医学课: <strong id="medCount">0</strong> / 8 次</span>
                <span class="badge" id="medWarning">不足扣10币</span>
            </div>
        </div>

        <!-- 日志框放在最下面 -->
        <div class="log-panel" id="logPanel">
            ⚡ 人生Online v1.3
        </div>
    </div>

    <script>
        (function() {
            // ==================== 云端存储配置 ====================
            const CLOUD_KEY = 'kaoyan_game_data_v13';
            
            // ==================== 初始化状态 ====================
            let state = {
                totalCoins: 0,
                todayEarn: 0,
                lastDate: '',
                earlyStreak: 0,
                wordStreak: 0,
                wordLastDate: '',
                lastWordRewardDay: '',
                medWeekCount: 0,
                medWeekResetDay: '',
                
                // 签到相关
                signHistory: [],
                weekSignCount: 0,
                lastSignWeek: '',
                
                // 限时任务
                timedTasks: [],
                nextTimedTaskId: 100,
                
                tasks: {
                    '02': { name: '英语单词', base: 2, count: 0, limit: '每日1次', last: '' },
                    '03': { name: '英语阅读课 (1.5h)', base: 3, count: 0, limit: '每日1次', last: '' },
                    '04': { name: '医学考研课 (1.5h)', base: 3, count: 0, limit: '每日≤3次', last: '', dayCount: 0 },
                    '05': { name: '阅读 1h', base: 2, count: 0, limit: '可重复', last: '' }
                },
                customTasks: [],
                nextCustomId: 6,
                taskOrder: ['02', '03', '04', '05'],
                store: [
                    { code: 'A1', name: '15分钟纯玩', cost: 1 },
                    { code: 'A2', name: '30分钟纯玩', cost: 2 },
                    { code: 'A3', name: '1小时深度游戏', cost: 4 },
                    { code: 'B1', name: '周末玩一下午', cost: 12 },
                    { code: 'B2', name: '美食基金 (1币=10元)', cost: 1 }
                ]
            };

            // ==================== 云端存储函数 ====================
            function saveToCloud() {
                try {
                    const dataStr = JSON.stringify(state);
                    localStorage.setItem(CLOUD_KEY, dataStr);
                    document.getElementById('cloudStatus').innerHTML = '● 已保存';
                    document.getElementById('cloudStatus').style.color = '#8affb8';
                    return true;
                } catch (e) {
                    document.getElementById('cloudStatus').innerHTML = '○ 保存失败';
                    document.getElementById('cloudStatus').style.color = '#ff8a8a';
                    return false;
                }
            }

            function loadFromCloud() {
                try {
                    const saved = localStorage.getItem(CLOUD_KEY);
                    if (saved) {
                        const loaded = JSON.parse(saved);
                        state = { ...state, ...loaded };
                        document.getElementById('cloudStatus').innerHTML = '● 已加载';
                        document.getElementById('cloudStatus').style.color = '#8affb8';
                        return true;
                    }
                    return false;
                } catch (e) {
                    document.getElementById('cloudStatus').innerHTML = '○ 加载失败';
                    document.getElementById('cloudStatus').style.color = '#ff8a8a';
                    return false;
                }
            }

            // ==================== 辅助函数 ====================
            function getTodayKey() {
                const d = new Date();
                return `${d.getFullYear()}-${d.getMonth()+1}-${d.getDate()}`;
            }

            function getWeekMondayKey() {
                const d = new Date();
                const day = d.getDay();
                const diff = (day === 0 ? 6 : day - 1);
                const m = new Date(d);
                m.setDate(d.getDate() - diff);
                return `${m.getFullYear()}-${m.getMonth()+1}-${m.getDate()}`;
            }

            function isWeekday() {
                const day = new Date().getDay();
                return day >= 1 && day <= 5;
            }

            function updateWeekday() {
                const d = new Date();
                const weekdays = ['周日', '周一', '周二', '周三', '周四', '周五', '周六'];
                return weekdays[d.getDay()] + ' ' + d.toLocaleDateString('zh-CN').slice(5);
            }

            function countdown() {
                const exam = new Date(2026, 11, 19);
                const today = new Date();
                const diff = Math.ceil((exam - today) / (1000 * 60 * 60 * 24));
                return diff >= 0 ? diff : 0;
            }

            function weekProgress() {
                const d = new Date();
                const day = d.getDay();
                if (day === 0) return '周日 / 周五';
                if (day === 6) return '周六 / 周五';
                const weekdays = ['周一', '周二', '周三', '周四', '周五'];
                return weekdays[day-1] + ' / 周五';
            }

            // 检查新的一天
            function checkNewDay() {
                const today = getTodayKey();
                if (state.lastDate !== today) {
                    state.tasks['02'].count = 0;
                    state.tasks['03'].count = 0;
                    state.tasks['04'].dayCount = 0;
                    state.tasks['05'].count = 0;
                    state.lastDate = today;
                    state.todayEarn = 0;
                    
                    // 单词中断检查
                    if (state.wordLastDate !== today) {
                        const yesterday = new Date(Date.now() - 86400000);
                        const yKey = `${yesterday.getFullYear()}-${yesterday.getMonth()+1}-${yesterday.getDate()}`;
                        if (state.wordLastDate && state.wordLastDate !== yKey) {
                            state.totalCoins = Math.max(0, state.totalCoins - 2);
                            state.wordStreak = 0;
                            pushLog('⚠️ 单词中断 -2币');
                        }
                    }
                    
                    // 医学周重置
                    const monday = getWeekMondayKey();
                    if (state.medWeekResetDay !== monday) {
                        if (state.medWeekResetDay && state.medWeekCount < 8) {
                            state.totalCoins = Math.max(0, state.totalCoins - 10);
                            pushLog('⚠️ 上周医学课不足8次 -10币');
                        }
                        state.medWeekCount = 0;
                        state.medWeekResetDay = monday;
                    }
                    
                    // 检查过期任务
                    checkExpiredTasks();
                    
                    // 更新签到显示
                    updateSignDisplay();
                    
                    saveToCloud();
                    renderAll();
                }
            }

            // ==================== 签到功能 ====================
            function signIn() {
                const now = new Date();
                const today = getTodayKey();
                const hour = now.getHours();
                const minute = now.getMinutes();
                
                // 检查今天是否已经签到过
                const todaySign = state.signHistory.find(s => s.date === today);
                if (todaySign) {
                    const [signHour, signMinute] = todaySign.time.split(':').map(Number);
                    let signType = '';
                    if (signHour < 7 || (signHour === 7 && signMinute < 30)) {
                        signType = '⭐ 7:30前';
                    } else if (signHour < 8) {
                        signType = '✓ 8:00前';
                    }
                    pushLog(`❌ 今天已经签到过了！${signType} (${todaySign.time})`);
                    return;
                }
                
                // 判断签到时间（7:30前）
                let reward = 0;
                let message = '';
                
                if (hour < 7 || (hour === 7 && minute < 30)) {
                    reward = 2;
                    message = `✅ 7:30前签到 +2币！`;
                } else if (hour < 8) {
                    reward = 1;
                    message = `✅ 8点前签到 +1币`;
                } else {
                    message = `🌙 明天继续加油！`;
                    pushLog(message);
                    return;
                }
                
                // 记录签到
                const signTime = `${hour.toString().padStart(2,'0')}:${minute.toString().padStart(2,'0')}`;
                state.signHistory.push({
                    date: today,
                    time: signTime,
                    reward: reward
                });
                
                // 增加金币
                state.totalCoins += reward;
                state.todayEarn += reward;
                
                // 如果是7:30前签到，计入本周统计
                if (hour < 7 || (hour === 7 && minute < 30)) {
                    // 检查是否需要重置周统计（周一重置）
                    const monday = getWeekMondayKey();
                    if (state.lastSignWeek !== monday) {
                        state.weekSignCount = 0;
                        state.lastSignWeek = monday;
                        
                        // 清理过期的签到历史（只保留最近两周）
                        const twoWeeksAgo = new Date();
                        twoWeeksAgo.setDate(twoWeeksAgo.getDate() - 14);
                        const cutoff = `${twoWeeksAgo.getFullYear()}-${twoWeeksAgo.getMonth()+1}-${twoWeeksAgo.getDate()}`;
                        state.signHistory = state.signHistory.filter(s => s.date >= cutoff);
                    }
                    state.weekSignCount += 1;
                    
                    // 检查是否达到5次7:30前签到
                    if (state.weekSignCount === 5) {
                        state.totalCoins += 3;
                        pushLog('🎉 本周7:30前签到满5次！额外奖励 +3币！');
                    }
                }
                
                pushLog(`${message} 签到时间：${signTime}`);
                
                // ✨ 关键：更新签到显示
                updateSignDisplay();
                
                saveToCloud();
                renderAll();
            }

            // 更新签到周显示（美化版）
            function updateSignDisplay() {
                const monday = getWeekMondayKey();
                let html = '';
                
                for (let i = 0; i < 7; i++) {
                    const targetDate = new Date(monday);
                    targetDate.setDate(parseInt(monday.split('-')[2]) + i);
                    const dateStr = `${targetDate.getFullYear()}-${targetDate.getMonth()+1}-${targetDate.getDate()}`;
                    
                    // 检查这天是否签到
                    const signRecord = state.signHistory.find(s => s.date === dateStr);
                    
                    let icon = '○';
                    let color = '#4a6b8a';
                    let bgColor = 'transparent';
                    
                    if (signRecord) {
                        const [hour, minute] = signRecord.time.split(':').map(Number);
                        const isEarly = hour < 7 || (hour === 7 && minute < 30);
                        
                        if (isEarly) {
                            icon = '⭐';
                            color = '#ffb347';
                            bgColor = '#2a4a3a';
                        } else {
                            icon = '✓';
                            color = '#6bb88b';
                            bgColor = '#1e4a3a';
                        }
                    } else {
                        // 检查是否已过当天（判断是否错过）
                        const today = new Date();
                        today.setHours(0, 0, 0, 0);
                        const checkDate = new Date(targetDate);
                        checkDate.setHours(0, 0, 0, 0);
                        
                        if (checkDate < today) {
                            icon = '❌';
                            color = '#ff6b6b';
                            bgColor = '#4a2a2a';
                        }
                    }
                    
                    // 获取星期几
                    const weekdays = ['一', '二', '三', '四', '五', '六', '日'];
                    
                    html += `
                        <div style="
                            display: inline-flex;
                            flex-direction: column;
                            align-items: center;
                            margin: 0 5px;
                        ">
                            <div style="
                                width: 45px;
                                height: 45px;
                                border-radius: 50%;
                                background: ${bgColor};
                                border: 2px solid ${color};
                                display: flex;
                                align-items: center;
                                justify-content: center;
                                font-size: 1.5rem;
                                color: ${color};
                                box-shadow: 0 2px 5px rgba(0,0,0,0.3);
                            ">${icon}</div>
                            <span style="
                                margin-top: 5px;
                                color: #96bcdd;
                                font-size: 0.8rem;
                            ">周${weekdays[i]}</span>
                        </div>
                    `;
                }
                
                document.getElementById('signWeekIndicator').innerHTML = html;
                document.getElementById('signStreakDisplay').innerHTML = `本周7:30前签到 ${state.weekSignCount}/5 次`;
            }

            // ==================== 限时任务功能 ====================
            function addTimedTask() {
                const nameInput = document.getElementById('taskNameInput');
                const rewardInput = document.getElementById('taskRewardInput');
                const daysInput = document.getElementById('taskDaysInput');
                
                const name = nameInput.value.trim();
                const reward = parseInt(rewardInput.value);
                const days = parseInt(daysInput.value);
                
                if (!name) {
                    pushLog('❌ 请输入任务名称');
                    return;
                }
                if (isNaN(reward) || reward < 1) {
                    pushLog('❌ 奖励币数必须大于0');
                    return;
                }
                if (isNaN(days) || days < 1) {
                    pushLog('❌ 限时天数必须大于0');
                    return;
                }
                
                const now = new Date();
                const deadline = new Date(now);
                deadline.setDate(deadline.getDate() + days);
                
                const task = {
                    id: state.nextTimedTaskId++,
                    name: name,
                    reward: reward,
                    deadline: deadline.toISOString(),
                    createdAt: now.toISOString(),
                    days: days,
                    completed: false
                };
                
                state.timedTasks.push(task);
                
                nameInput.value = '';
                rewardInput.value = '1';
                daysInput.value = '2';
                
                pushLog(`✅ 添加限时任务：${name}，${reward}币，${days}天内完成`);
                
                saveToCloud();
                renderAll();
            }

            function completeTimedTask(taskId) {
                const taskIndex = state.timedTasks.findIndex(t => t.id === taskId && !t.completed);
                if (taskIndex === -1) {
                    pushLog('❌ 任务不存在或已完成');
                    return;
                }
                
                const task = state.timedTasks[taskIndex];
                const now = new Date();
                const deadline = new Date(task.deadline);
                
                if (now > deadline) {
                    pushLog(`❌ 任务「${task.name}」已过期，无法完成`);
                    state.timedTasks.splice(taskIndex, 1);
                    saveToCloud();
                    renderAll();
                    return;
                }
                
                state.totalCoins += task.reward;
                state.todayEarn += task.reward;
                state.timedTasks.splice(taskIndex, 1);
                
                pushLog(`✅ 完成限时任务「${task.name}」 +${task.reward}币`);
                
                saveToCloud();
                renderAll();
            }

            function checkExpiredTasks() {
                const now = new Date();
                let expiredCount = 0;
                
                state.timedTasks = state.timedTasks.filter(task => {
                    const deadline = new Date(task.deadline);
                    if (now > deadline) {
                        expiredCount++;
                        return false;
                    }
                    return true;
                });
                
                if (expiredCount > 0) {
                    pushLog(`⚠️ ${expiredCount}个限时任务已过期自动移除`);
                }
            }

            function getRemainingTime(deadline) {
                const now = new Date();
                const end = new Date(deadline);
                const diffMs = end - now;
                
                if (diffMs <= 0) return '已过期';
                
                const diffDays = Math.floor(diffMs / (1000 * 60 * 60 * 24));
                const diffHours = Math.floor((diffMs % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
                
                if (diffDays > 0) {
                    return `${diffDays}天${diffHours}小时`;
                } else {
                    const diffMins = Math.floor((diffMs % (1000 * 60 * 60)) / (1000 * 60));
                    return `${diffHours}小时${diffMins}分钟`;
                }
            }

            // ==================== 核心功能 ====================
            function completeTask(taskId) {
                const today = getTodayKey();
                const task = state.tasks[taskId];
                
                // 处理自定义任务
                if (!task) {
                    const customIndex = state.customTasks.findIndex(t => t.id == taskId);
                    if (customIndex === -1) { 
                        pushLog('❌ 任务编号不存在'); 
                        return; 
                    }
                    
                    const custom = state.customTasks[customIndex];
                    state.totalCoins += custom.base;
                    state.todayEarn += custom.base;
                    pushLog(`✅ 完成 ${custom.name} +${custom.base}币（任务已移除）`);
                    
                    state.customTasks.splice(customIndex, 1);
                    
                    saveToCloud(); 
                    renderAll(); 
                    return;
                }

                if (taskId === '02') {
                    if (task.count >= 1) { pushLog('❌ 单词每日一次'); return; }
                    task.count = 1;
                    const yKey = new Date(Date.now() - 86400000);
                    const yKeyStr = `${yKey.getFullYear()}-${yKey.getMonth()+1}-${yKey.getDate()}`;
                    if (state.wordLastDate === yKeyStr) {
                        state.wordStreak += 1;
                    } else {
                        state.wordStreak = 1;
                    }
                    state.wordLastDate = today;
                    state.totalCoins += task.base;
                    state.todayEarn += task.base;
                    pushLog(`✅ 英语单词 +${task.base}币`);
                    
                    // 单词连续7天奖励
                    if (state.wordStreak > 0 && state.wordStreak % 7 === 0) {
                        if (state.lastWordRewardDay !== today) {
                            state.totalCoins += 3;
                            state.lastWordRewardDay = today;
                            pushLog('🎁 单词连续7天 +3币');
                        }
                    }
                }
                else if (taskId === '03') {
                    if (task.count >= 1) { pushLog('❌ 英语课每日一次'); return; }
                    task.count = 1;
                    state.totalCoins += task.base;
                    state.todayEarn += task.base;
                    pushLog(`✅ 英语阅读课 +${task.base}币`);
                }
                else if (taskId === '04') {
                    const dayCount = state.tasks['04'].dayCount || 0;
                    if (dayCount >= 3) { pushLog('❌ 医学课今日已达3次上限'); return; }
                    state.tasks['04'].dayCount = dayCount + 1;
                    state.medWeekCount += 1;
                    state.totalCoins += task.base;
                    state.todayEarn += task.base;
                    pushLog(`✅ 医学考研课 +${task.base}币 (本周第${state.medWeekCount}次)`);
                }
                else if (taskId === '05') {
                    state.totalCoins += task.base;
                    state.todayEarn += task.base;
                    task.count = (task.count || 0) + 1;
                    pushLog(`✅ 阅读1h +${task.base}币`);
                }
                
                saveToCloud();
                renderAll();
            }

            // 商店购买
            function buyItem(code) {
                const item = state.store.find(s => s.code === code);
                if (!item) return;
                if (state.totalCoins < item.cost) { pushLog('❌ 金币不足'); return; }
                state.totalCoins -= item.cost;
                
                // 时间兑换类触发倒计时
                if (code === 'A1' || code === 'A2' || code === 'A3') {
                    let minutes = 0;
                    if (code === 'A1') minutes = 15;
                    else if (code === 'A2') minutes = 30;
                    else if (code === 'A3') minutes = 60;
                    
                    startTimer(minutes);
                    pushLog(`🎮 兑换 ${item.name}，倒计时 ${minutes} 分钟开始！`);
                }
                else if (code === 'B1') {
                    pushLog(`🎮 兑换 ${item.name}，好好享受周末！`);
                }
                else if (code === 'B2') {
                    pushLog(`🍜 美食基金到账 ${item.cost*10}元`);
                }
                
                saveToCloud(); 
                renderAll();
            }

            // 添加临时任务
            function addCustomTask(name, reward) {
                const id = state.nextCustomId++;
                state.customTasks.push({ id, name, base: parseInt(reward) || 1 });
                pushLog(`📌 添加临时任务 ${id}：${name} +${reward}币（完成即消失）`);
                saveToCloud(); 
                renderAll();
            }

            // ==================== 倒计时功能 ====================
            let timerInterval = null;

            function startTimer(minutes) {
                if (timerInterval) {
                    clearInterval(timerInterval);
                }
                
                let totalSeconds = minutes * 60;
                const timerDiv = document.createElement('div');
                timerDiv.id = 'restTimer';
                timerDiv.style.cssText = `
                    position: fixed;
                    top: 20px;
                    right: 20px;
                    background: #1a3f5a;
                    border: 2px solid #ffb347;
                    border-radius: 60px;
                    padding: 15px 25px;
                    color: #ffdb9d;
                    font-size: 2rem;
                    font-weight: 700;
                    z-index: 9999;
                    box-shadow: 0 10px 20px rgba(0,0,0,0.5);
                    backdrop-filter: blur(5px);
                    text-align: center;
                    min-width: 200px;
                `;
                
                timerDiv.innerHTML = `
                    <div style="font-size: 1rem; color: #b3e0ff; margin-bottom: 5px;">⏰ 休息倒计时</div>
                    <div id="timerDisplay">${formatTime(totalSeconds)}</div>
                    <div style="font-size: 0.8rem; margin-top: 8px; color: #96bcdd;" id="timerMessage">放松中...</div>
                    <button onclick="stopTimer()" style="
                        margin-top: 10px;
                        background: #4a2b2b;
                        border: 1px solid #ff6b6b;
                        color: white;
                        padding: 5px 15px;
                        border-radius: 30px;
                        font-size: 0.8rem;
                        cursor: pointer;
                    ">提前结束</button>
                `;
                
                document.body.appendChild(timerDiv);
                
                timerInterval = setInterval(() => {
                    totalSeconds--;
                    
                    if (totalSeconds <= 0) {
                        clearInterval(timerInterval);
                        timerInterval = null;
                        document.getElementById('timerDisplay').innerText = '00:00';
                        document.getElementById('timerMessage').innerText = '⏰ 休息结束！回去学习吧';
                        
                        setTimeout(() => {
                            if (document.getElementById('restTimer')) {
                                document.getElementById('restTimer').remove();
                            }
                        }, 3000);
                        
                        pushLog('⏰ 休息时间结束！继续加油！');
                    } else {
                        document.getElementById('timerDisplay').innerText = formatTime(totalSeconds);
                        
                        if (totalSeconds > 60) {
                            document.getElementById('timerMessage').innerText = '好好放松～';
                        } else {
                            document.getElementById('timerMessage').innerText = '快结束啦，准备学习';
                        }
                    }
                }, 1000);
            }

            function formatTime(seconds) {
                const mins = Math.floor(seconds / 60);
                const secs = seconds % 60;
                return `${mins.toString().padStart(2, '0')}:${secs.toString().padStart(2, '0')}`;
            }

            function stopTimer() {
                if (timerInterval) {
                    clearInterval(timerInterval);
                    timerInterval = null;
                    if (document.getElementById('restTimer')) {
                        document.getElementById('restTimer').remove();
                    }
                    pushLog('⏹️ 休息提前结束，继续奋斗！');
                }
            }

            // ==================== 渲染界面 ====================
            function renderAll() {
                document.getElementById('currentDate').innerText = new Date().toLocaleDateString('zh-CN');
                document.getElementById('examCountdown').innerText = countdown() + '天';
                document.getElementById('weekProgress').innerText = weekProgress();
                document.getElementById('weekdayDisplay').innerText = updateWeekday();
                document.getElementById('todayEarn').innerText = state.todayEarn;
                document.getElementById('totalCoins').innerText = state.totalCoins;
                document.getElementById('earlyStreak').innerText = state.earlyStreak;
                document.getElementById('wordStreak').innerText = state.wordStreak;
                document.getElementById('medCount').innerText = state.medWeekCount;
                document.getElementById('medWarning').innerText = state.medWeekCount >= 8 ? '✅ 已达标' : '不足扣10币';

                // 任务表格
                let html = '<tr><th>编号</th><th>任务</th><th>奖励</th><th></th></tr>';
                for (let id of state.taskOrder) {
                    const t = state.tasks[id];
                    let limitNote = t.limit;
                    if (id === '04') limitNote = `今日 ${t.dayCount || 0}/3`;
                    if (id === '05') limitNote = `今日 ${t.count || 0} 次`;
                    html += `<tr><td><span class="task-num">${id}</span></td>
                    <td><span class="task-name">${t.name}</span><div class="task-limit">${limitNote}</div></td>
                    <td><span class="reward-badge">+${t.base}币</span></td>
                    <td><button class="button-small" onclick="window.complete('${id}')">完成</button></td></tr>`;
                }
                
                // 限时任务
                for (let t of state.timedTasks) {
                    if (t.completed) continue;
                    
                    const remaining = getRemainingTime(t.deadline);
                    const isExpired = remaining === '已过期';
                    
                    html += `<tr><td><span class="task-num-timed">T${t.id}</span></td>
                    <td>
                        <span class="task-name">${t.name}</span>
                        <div class="task-limit" style="color: ${isExpired ? '#ff8a8a' : '#f1c40f'};">
                            ⏳ 剩余 ${remaining}
                        </div>
                    </td>
                    <td><span class="reward-badge">+${t.reward}币</span></td>
                    <td>
                        <button class="button-small" onclick="window.completeTimedTask(${t.id})" 
                            ${isExpired ? 'disabled style="opacity:0.5;"' : ''}>
                            ${isExpired ? '已过期' : '完成'}
                        </button>
                    </td></tr>`;
                }
                
                // 自定义临时任务
                for (let c of state.customTasks) {
                    html += `<tr><td><span class="task-num">${c.id}</span></td>
                    <td>${c.name}<div class="task-limit">✨ 临时·完成消失</div></td>
                    <td><span class="reward-badge">+${c.base}币</span></td>
                    <td><button class="button-small" onclick="window.complete('${c.id}')">完成</button></td></tr>`;
                }
                document.getElementById('taskTable').innerHTML = html;

                // 商店
                let storeHtml = '';
                state.store.forEach(s => {
                    storeHtml += `<div class="store-item" onclick="window.buy('${s.code}')">${s.name}<br><span style="color:#fdb;font-weight:700;">${s.cost}币</span></div>`;
                });
                document.getElementById('storeGrid').innerHTML = storeHtml;
            }

            function pushLog(msg) {
                const log = document.getElementById('logPanel');
                log.innerHTML = '⚡ ' + msg + '<br>' + log.innerHTML.slice(0, 200);
            }

            // ==================== 初始化 ====================
            function init() {
                loadFromCloud();
                checkNewDay();
                updateSignDisplay();
                renderAll();
                
                setInterval(() => {
                    saveToCloud();
                }, 30000);
            }

            // ==================== 事件绑定 ====================
            window.complete = completeTask;
            window.buy = buyItem;
            window.completeTimedTask = completeTimedTask;
            window.stopTimer = stopTimer;

            document.addEventListener('DOMContentLoaded', function() {
                init();
                
                // 签到按钮
                document.getElementById('signBtn').addEventListener('click', function() {
                    signIn();
                });
                
                // 添加限时任务
                document.getElementById('addTaskBtn').addEventListener('click', function() {
                    addTimedTask();
                });
                
                // 回车添加
                document.getElementById('taskDaysInput').addEventListener('keyup', function(e) {
                    if (e.key === 'Enter') {
                        addTimedTask();
                    }
                });

                document.getElementById('manualSaveBtn').addEventListener('click', function() {
                    saveToCloud();
                });

                document.getElementById('manualLoadBtn').addEventListener('click', function() {
                    loadFromCloud();
                    renderAll();
                });
            });
        })();
    </script>
</body>
</html>
